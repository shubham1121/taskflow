<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast alert" [ngClass]="{'alert-success': toastType === ToastType.Success, 'alert-danger': toastType === ToastType.Error, 'alert-warning': toastType === ToastType.Warning, 'alert-info': toastType === ToastType.Info}" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="2000">
    <div class="toast-header">
      <strong class="me-auto">{{ toastHeading }}</strong>
    </div>
    <div class="toast-body">
      {{ toastMessage }}
    </div>
  </div>
</div>
